<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nairobi Spots - Discover the Best Places in Nairobi</title>
    <link rel="Preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav>
        <nav class="nav">
            <div class="nav-inner">
                <div class="logo">
                    <span class="logo-n">Nairobi</span><span class="logo-s">Spots</span>
                </div>
                <div class="nav-right">
                    <span class="nav-tagline">Home</span>
                </div>
            </div> 
        </nav>
    </nav>
<header class="header-content">
        <div class="header-texture">    
        <div class="header-inner">
            <p class="header-text">Nairobi's Restaurant Guide</p>
            <h1 class="header-title">Discover the Best<br /><em>Spots in Nairobi</em></h1>
            <p class="header-description">Curated restaurants across Nairobi, reviewed by real diners</p>
            <div class="header-search"
                <input type="text" id="global-search" placeholder="Search for restaurants, cuisines, or locations" oninput="handleSearch(this.value)" />
                <button onclick="clearSearch()">x</button>
                <button class="search-button">Search</button>
            </div>
        </div>
        </div>
</header>

<section class="locations-bar">
    <div class="locations-inner">
        <p class="location-labels">Browse by Location</p>
        <div class="location-tabs" id="locationTabs">
            <button class="location-tab active" data-loc="all" onclick="filterByLocation('all', this)">All</button>
            <button class="location-tab" data-loc="westlands" data-loc="westlands" onclick="filterByLocation('westlands', this)">Westlands</button>
            <button class="location-tab" data-loc="kilimani" data-loc="kilimani" onclick="filterByLocation('kilimani', this)">Kilimani</button>
            <button class="location-tab" data-loc="lavington" data-loc="lavington" onclick="filterByLocation('lavington', this)">Lavington</button>
            <button class="location-tab" data-loc="parklands" data-loc="parklands" onclick="filterByLocation('parklands', this)">Parklands</button>
        </div>
    </div>
    </section>

    <div class="map-strip" idmap-strip>
        <div class="map-strip-inner">
            <p class="map-strip-label">Explore Nairobi on the Map</p>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15955.123456789012!2d36.8219!3d-1.2921!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f10a123456789%3A0xabcdef1234567890!2sNairobi%20City%20Center!5e0!3m2!1sen!2ske!4v1234567890123" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                <main class="main">
    <div class="container">
      <div class="results-bar">
        <span id="resultsCount" class="results-count"></span>
        <div class="sort-wrap">
          <label for="sortSelect">Sort:</label>
          <select id="sortSelect" onchange="sortRestaurants(this.value)">
            <option value="rating">Top Rated</option>
            <option value="reviews">Most Reviewed</option>
            <option value="name">A–Z</option>
          </select>
        </div>
      </div>
      <div class="restaurant-grid" id="restaurantGrid"></div>
    </div>
  </main>

</body>
</html>
